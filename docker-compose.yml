services:
  postgres:
    image: postgres:15
    container_name: reuse-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin


  backend:
    build:
      context: ./src/backend
      dockerfile: ReUse.API/Dockerfile.dev
    container_name: reuse_backend
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    volumes:
      - ./src/backend:/app
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__pgsql=Host=${DB_HOST};Port=${DB_PORT};Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__Lifetime=${JWT_LIFETIME}
      - Jwt__SigningKey=${JWT_KEY}
      - RefreshToken__Lifetime=${RT_LIFETIME}
      - ADMIN__FULLNAME=${ADMIN__FULLNAME}
      - ADMIN__USERNAME=${ADMIN__USERNAME}
      - ADMIN__EMAIL=${ADMIN__EMAIL}
      - ADMIN__PASSWORD=${ADMIN__PASSWORD}
      - EMAILSETTINGS__HOST=${EMAILSETTINGS__HOST}
      - EMAILSETTINGS__PORT=${EMAILSETTINGS__PORT}
      - EMAILSETTINGS__FROM=${EMAILSETTINGS__FROM}
      - EMAILSETTINGS__USERNAME=${EMAILSETTINGS__USERNAME}
      - EMAILSETTINGS__PASSWORD=${EMAILSETTINGS__PASSWORD}
      - CloudinarySettings__CloudName=${CLOUDINARY__CLOUDNAME}
      - CloudinarySettings__ApiKey=${CLOUDINARY__APIKEY}
      - CloudinarySettings__ApiSecret=${CLOUDINARY__APISECRET}
      - PAYMOB__PUBLICKEY=${PAYMOB__PUBLICKEY}
      - PAYMOB__SECRETKEY=${PAYMOB__SECRETKEY}
      - PAYMOB__HMAC=${PAYMOB__HMAC}
      - Paymob__CardIntegrationId=${PAYMOB__CARD_INTEGRATION_ID}
      - Paymob__CallbackUrl=${PAYMOB__CALLBACK_URL}
      - Assistant__EmbeddingBaseUrl=${ASSISTANT__EMBEDDING_BASE_URL}
      - Assistant__InternalKey=${ASSISTANT__INTERNAL_KEY}
      - Assistant__GroqApiKey=${ASSISTANT__GROQ_API_KEY}
      - Assistant__GroqModel=${ASSISTANT__GROQ_MODEL}

  embedding:
    build:
      context: ./src/embedding
    container_name: reuse_embedding
    depends_on:
      - backend
    ports:
      - "8000:8000"
    volumes:
      - ./.embedding-data:/data
    environment:
      - EMBEDDING_DATA_DIR=/data
      - EMBEDDING_BACKEND_FEED_URL=${ASSISTANT__PRODUCT_FEED_URL}
      - EMBEDDING_INTERNAL_KEY=${ASSISTANT__INTERNAL_KEY}
    restart: unless-stopped


  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile.dev
    container_name: reuse_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - CHOKIDAR_USEPOLLING=true

volumes:
  postgres_data:
  pgadmin_data:
